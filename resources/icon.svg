<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      .icon-bg { fill: #007ACC; }
      .icon-fg { fill: #FFFFFF; }
    </style>
  </defs>
  <rect class="icon-bg" width="64" height="64" rx="8"/>
  <g class="icon-fg">
    <!-- Timeline dots -->
    <circle cx="16" cy="16" r="3"/>
    <circle cx="16" cy="32" r="3"/>
    <circle cx="16" cy="48" r="3"/>
    
    <!-- Timeline line -->
    <line x1="16" y1="19" x2="16" y2="29" stroke="white" stroke-width="2"/>
    <line x1="16" y1="35" x2="16" y2="45" stroke="white" stroke-width="2"/>
    
    <!-- Message bubbles -->
    <rect x="24" y="12" width="28" height="10" rx="2" fill="#0078D4" opacity="0.8"/>
    <rect x="24" y="28" width="28" height="10" rx="2" fill="#555555" opacity="0.8"/>
    <rect x="24" y="44" width="28" height="10" rx="2" fill="#0078D4" opacity="0.8"/>
  </g>
</svg>
